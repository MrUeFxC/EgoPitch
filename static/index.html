<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EgoPitch - 球星访谈模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; height: 100vh; display: flex; flex-direction: column; }

        /* 头部 */
        header { text-align: center; padding: 10px 0; }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: #666; font-size: 0.9rem; }

        /* 状态栏 */
        .status-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 星球星信息区 */
        .star-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .star-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f5af19;
            box-shadow: 0 2px 8px rgba(245, 175, 25, 0.3);
        }
        .star-name { font-size: 1.1rem; font-weight: bold; color: #f5af19; }

        .layer-badge {
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .layer-1 { background: #22c55e; }
        .layer-2 { background: #f59e0b; }
        .layer-3 { background: #ef4444; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .anger-section { display: flex; align-items: center; gap: 8px; flex: 1; max-width: 300px; }
        .anger-bar {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .anger-fill { height: 100%; transition: width 0.3s, background 0.3s; border-radius: 5px; }

        .sentiment-badge { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; background: rgba(239,68,68,0.3); }

        /* 主内容区 - 弹幕模式 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* 聊天区 */
        .chat-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 弹幕层 */
        .barrage-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 120px;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        .barrage-item {
            position: absolute;
            white-space: nowrap;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            animation: barrageMove linear forwards;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .barrage-item .likes { font-size: 0.7rem; opacity: 0.7; }

        /* 弹幕颜色 */
        .barrage-item.fan { background: rgba(34, 197, 94, 0.7); color: #fff; }
        .barrage-item.hater { background: rgba(239, 68, 68, 0.8); color: #fff; }
        .barrage-item.neutral { background: rgba(100, 100, 100, 0.6); color: #fff; }
        .barrage-item.provocative { background: rgba(249, 158, 11, 0.8); color: #fff; font-weight: bold; }
        .barrage-item.troll { background: rgba(168, 85, 247, 0.8); color: #fff; }
        .barrage-item.ai_generated { background: rgba(124, 58, 237, 0.7); color: #fff; }

        @keyframes barrageMove {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* 弹幕控制 */
        .barrage-controls {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 20;
            display: flex;
            gap: 8px;
        }
        .barrage-btn {
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.75rem;
            cursor: pointer;
            border: none;
        }
        .barrage-btn:hover { background: rgba(255,255,255,0.3); }
        .barrage-btn.active { background: rgba(34, 197, 94, 0.6); }

        /* 聊天内容 */
        .chat-container {
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            z-index: 5;
            position: relative;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message.host {
            background: #2563eb;
            margin-right: auto;
            flex-direction: row-reverse;
        }
        .message.star {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            margin-left: auto;
        }
        .message .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .message .msg-content { flex: 1; }
        .message .sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 3px; }
        .message .anger-tag { font-size: 0.65rem; color: #f59e0b; margin-top: 3px; }

        /* 输入区 */
        .input-area { display: flex; gap: 8px; z-index: 5; position: relative; }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
        }
        .input-area input::placeholder { color: #666; }
        .input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .input-area button:hover { transform: scale(1.02); }
        .reset-btn { background: rgba(255,255,255,0.2) !important; }

        /* 触发词面板 */
        .triggers-panel {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            z-index: 5;
        }
        .triggers-panel h4 { color: #f59e0b; margin-bottom: 8px; font-size: 0.85rem; }
        .trigger-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .trigger-row span {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .trigger-row.heavy span:hover { background: rgba(239, 68, 68, 0.5); }
        .trigger-row.medium span:hover { background: rgba(249, 158, 11, 0.5); }
        .trigger-row.light span:hover { background: rgba(34, 197, 94, 0.5); }

        /* 舆论统计区 */
        .pulse-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .pulse-section h3 { font-size: 0.9rem; color: #f59e0b; margin-bottom: 8px; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .stat-item {
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .stat-item .value { font-size: 1.2rem; font-weight: bold; }
        .stat-item .label { font-size: 0.7rem; color: #888; }
        .stat-item.negative .value { color: #ef4444; }
        .stat-item.positive .value { color: #22c55e; }

        /* 评论流列表 */
        .comment-stream {
            flex: 1;
            overflow-y: auto;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 8px;
        }
        .comment-item {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .comment-item.fan { border-left: 3px solid #22c55e; }
        .comment-item.hater { border-left: 3px solid #ef4444; }
        .comment-item.neutral { border-left: 3px solid #888; }
        .comment-item.provocative { border-left: 3px solid #f59e0b; }
        .comment-item.troll { border-left: 3px solid #a855f7; }
        .comment-meta {
            font-size: 0.65rem;
            color: #666;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        /* 怒气弹窗 */
        .anger-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.95);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            z-index: 100;
            animation: popIn 0.4s ease-out forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            60% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 阶段指示 */
        .phase-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(100,100,100,0.4);
        }

        /* 主持人头像 */
        .host-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EgoPitch</h1>
            <p>世界杯球星 AI 访谈模拟器 · 实时弹幕舆论刺激</p>
        </header>

        <div class="status-bar">
            <div class="star-info">
                <img class="star-avatar" id="starAvatar" src="/static/avatars/default.png" alt="avatar">
                <div class="star-name" id="starName">C罗</div>
            </div>
            <div class="phase-badge" id="phaseIndicator">开场阶段</div>
            <div class="layer-badge layer-1" id="layerBadge">公共人格</div>
            <div class="anger-section">
                <span style="font-size:0.8rem;">怒气</span>
                <div class="anger-bar">
                    <div class="anger-fill" id="angerFill" style="width: 0%; background: #22c55e;"></div>
                </div>
                <span id="angerText" style="font-size:0.85rem;">0%</span>
            </div>
            <div class="sentiment-badge" id="sentimentBadge">舆论: 0</div>
        </div>

        <div class="main-content">
            <!-- 聊天区 -->
            <div class="chat-section">
                <!-- 弹幕控制 -->
                <div class="barrage-controls">
                    <button class="barrage-btn active" id="barrageToggle" onclick="toggleBarrage()">弹幕 ON</button>
                    <button class="barrage-btn" onclick="clearBarrage()">清空</button>
                </div>

                <!-- 弹幕层 -->
                <div class="barrage-layer" id="barrageLayer"></div>

                <!-- 聊天内容 -->
                <div class="chat-container" id="chatContainer">
                    <div class="message star">
                        <img class="msg-avatar" id="firstMsgAvatar" src="/static/avatars/default.png" alt="avatar">
                        <div class="msg-content">
                            <div class="sender">C罗</div>
                            <div>大家好，感谢今天的邀请。我准备好回答任何问题了。</div>
                        </div>
                    </div>
                </div>

                <!-- 输入区 -->
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="输入犀利问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">发送</button>
                    <button class="reset-btn" onclick="resetGame()">重置</button>
                </div>

                <!-- 触发词 -->
                <div class="triggers-panel">
                    <h4>🎯 快速触发</h4>
                    <div class="trigger-row heavy">
                        <span onclick="useTrigger('替补')">替补</span>
                        <span onclick="useTrigger('替补席')">替补席</span>
                        <span onclick="useTrigger('废物')">废物</span>
                        <span onclick="useTrigger('垃圾')">垃圾</span>
                    </div>
                    <div class="trigger-row medium">
                        <span onclick="useTrigger('梅西')">梅西</span>
                        <span onclick="useTrigger('下滑')">下滑</span>
                        <span onclick="useTrigger('老了')">老了</span>
                        <span onclick="useTrigger('过气')">过气</span>
                        <span onclick="useTrigger('不如')">不如</span>
                    </div>
                    <div class="trigger-row light">
                        <span onclick="useTrigger('为什么')">为什么</span>
                        <span onclick="useTrigger('质疑')">质疑</span>
                        <span onclick="useTrigger('批评')">批评</span>
                    </div>
                </div>
            </div>

            <!-- 舆论统计 -->
            <div class="pulse-section">
                <h3>📊 舆论分析</h3>
                <div class="stats-grid">
                    <div class="stat-item negative">
                        <div class="value" id="haterCount">0</div>
                        <div class="label">黑粉评论</div>
                    </div>
                    <div class="stat-item positive">
                        <div class="value" id="fanCount">0</div>
                        <div class="label">粉丝评论</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="totalSentiment">0</div>
                        <div class="label">负面舆论值</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="barrageCount">0</div>
                        <div class="label">弹幕总数</div>
                    </div>
                </div>

                <div class="comment-stream" id="commentStream">
                    <div style="color:#666;font-size:0.8rem;text-align:center;">实时评论流...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 弹幕系统
        let barrageEnabled = true;
        let barrageInterval = null;
        let barrageQueue = [];
        let commentStats = { fan: 0, hater: 0, neutral: 0, provocative: 0, troll: 0, ai_generated: 0 };
        let totalBarrageCount = 0;
        let currentAvatar = '/static/avatars/default.png';
        let currentStarName = 'C罗';

        const phaseNames = { 1: '开场阶段', 2: '试探阶段', 3: '深挖阶段', 4: '引爆阶段' };
        const barrageSpeed = { slow: 10, normal: 8, fast: 6 };

        // 启动弹幕轮询
        function startBarragePolling() {
            if (barrageInterval) return;

            barrageInterval = setInterval(async () => {
                if (!barrageEnabled) return;

                try {
                    const res = await fetch('/api/barrage?count=6');
                    const data = await res.json();
                    addBarrageItems(data.comments);
                    updateSentimentDisplay(data.sentiment);
                } catch (e) {
                    console.error('弹幕获取失败:', e);
                }
            }, 2000);
        }

        // 添加弹幕
        function addBarrageItems(comments) {
            const layer = document.getElementById('barrageLayer');
            const stream = document.getElementById('commentStream');

            comments.forEach((c, i) => {
                commentStats[c.type] = (commentStats[c.type] || 0) + 1;
                totalBarrageCount++;

                if (barrageEnabled) {
                    const item = document.createElement('div');
                    item.className = `barrage-item ${c.type}`;
                    item.style.top = `${10 + (i % 6) * 38}px`;
                    item.style.animationDuration = `${6 + Math.random() * 4}s`;
                    item.innerHTML = `${c.content} <span class="likes">♥${c.likes}</span>`;
                    layer.appendChild(item);
                    item.addEventListener('animationend', () => item.remove());
                }

                const streamItem = document.createElement('div');
                streamItem.className = `comment-item ${c.type}`;
                streamItem.innerHTML = `
                    <div>${c.content}</div>
                    <div class="comment-meta">
                        <span>${c.type}</span>
                        <span>♥${c.likes}</span>
                    </div>
                `;
                stream.insertBefore(streamItem, stream.firstChild);

                while (stream.children.length > 30) {
                    stream.removeChild(stream.lastChild);
                }
            });

            updateStats();
        }

        function updateStats() {
            document.getElementById('haterCount').textContent = commentStats.hater || 0;
            document.getElementById('fanCount').textContent = commentStats.fan || 0;
            document.getElementById('totalSentiment').textContent = document.getElementById('sentimentBadge').textContent.replace('舆论: ', '');
            document.getElementById('barrageCount').textContent = totalBarrageCount;
        }

        function updateSentimentDisplay(value) {
            document.getElementById('sentimentBadge').textContent = `舆论: ${value}`;
            document.getElementById('totalSentiment').textContent = value;
        }

        function toggleBarrage() {
            barrageEnabled = !barrageEnabled;
            const btn = document.getElementById('barrageToggle');
            btn.textContent = barrageEnabled ? '弹幕 ON' : '弹幕 OFF';
            btn.classList.toggle('active', barrageEnabled);
        }

        function clearBarrage() {
            document.getElementById('barrageLayer').innerHTML = '';
        }

        // 聊天功能
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'host', 0);
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();

                // 更新头像
                if (data.avatar) {
                    currentAvatar = data.avatar;
                    updateAvatarDisplay(data.avatar);
                }

                if (data.anger_increase > 0) {
                    showAngerPopup(data.anger_increase);
                }

                if (data.comments && data.comments.length > 0) {
                    addBarrageItems(data.comments);
                }

                setTimeout(() => {
                    addMessage(data.response, 'star', data.anger_increase);
                    updateState(data);
                }, 300);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function updateAvatarDisplay(avatarUrl) {
            // 更新状态栏头像
            document.getElementById('starAvatar').src = avatarUrl;
            // 更新首条消息头像
            document.getElementById('firstMsgAvatar').src = avatarUrl;
        }

        async function resetGame() {
            try {
                await fetch('/api/reset', { method: 'POST' });

                const avatarHtml = currentAvatar ? `<img class="msg-avatar" src="${currentAvatar}" alt="avatar">` : '';
                const starName = currentStarName || 'C罗';

                document.getElementById('chatContainer').innerHTML = `
                    <div class="message star">
                        ${avatarHtml}
                        <div class="msg-content">
                            <div class="sender">${starName}</div>
                            <div>大家好，感谢今天的邀请。我准备好回答任何问题了。</div>
                        </div>
                    </div>
                `;
                document.getElementById('commentStream').innerHTML = `
                    <div style="color:#666;font-size:0.8rem;text-align:center;">实时评论流...</div>
                `;
                clearBarrage();
                commentStats = { fan: 0, hater: 0, neutral: 0, provocative: 0, troll: 0, ai_generated: 0 };
                totalBarrageCount = 0;
                updateStats();
                updateState({ anger: 0, layer: 1, layer_name: '公共人格', phase: 1, sentiment: 0 });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function showAngerPopup(increase) {
            const popup = document.createElement('div');
            popup.className = 'anger-popup';
            popup.textContent = `怒气 +${increase}`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 400);
        }

        function addMessage(text, type, angerInc) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            const avatarHtml = type === 'star'
                ? `<img class="msg-avatar" src="${currentAvatar}" alt="avatar">`
                : '<div class="host-avatar">主</div>';

            const senderName = type === 'host' ? '主持人' : currentStarName;
            const angerTag = angerInc > 0 && type === 'star' ? `<div class="anger-tag">⚡ +${angerInc}</div>` : '';

            msg.innerHTML = `
                ${avatarHtml}
                <div class="msg-content">
                    <div class="sender">${senderName}</div>
                    <div>${text}</div>
                    ${angerTag}
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function updateState(data) {
            document.getElementById('angerFill').style.width = `${data.anger}%`;
            document.getElementById('angerText').textContent = `${data.anger}%`;
            document.getElementById('layerBadge').textContent = data.layer_name;
            document.getElementById('layerBadge').className = `layer-badge layer-${data.layer}`;
            document.getElementById('phaseIndicator').textContent = phaseNames[data.phase] || '开场阶段';

            if (data.avatar) {
                updateAvatarDisplay(data.avatar);
            }

            const angerFill = document.getElementById('angerFill');
            if (data.anger < 40) angerFill.style.background = '#22c55e';
            else if (data.anger < 80) angerFill.style.background = '#f59e0b';
            else angerFill.style.background = '#ef4444';

            fetch('/api/state').then(r => r.json()).then(s => {
                updateSentimentDisplay(s.sentiment);
                if (s.avatar) updateAvatarDisplay(s.avatar);
                if (s.star) {
                    currentStarName = s.star;
                    document.getElementById('starName').textContent = s.star;
                }
            });
        }

        function useTrigger(word) {
            document.getElementById('messageInput').value = `你觉得${word}这个问题怎么看？`;
            sendMessage();
        }

        // 初始化
        fetch('/api/state').then(r => r.json()).then(data => {
            document.getElementById('starName').textContent = data.star;
            currentStarName = data.star;
            if (data.avatar) {
                currentAvatar = data.avatar;
                updateAvatarDisplay(data.avatar);
            }
            updateState(data);
        });

        startBarragePolling();
    </script>
</body>
</html>
